name: GA4 Daily Fetch

on:
  schedule:
    # 3:30am PT = 11:30am UTC (standard time) / 10:30am UTC (daylight time)
    # Using 11:30 UTC -- works correctly Nov-Mar; runs at 3:30am PDT May-Nov (one hour early, acceptable)
    - cron: '30 11 * * *'
  workflow_dispatch: # allow manual runs

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-analytics-data google-auth google-auth-httplib2 python-dotenv

      - name: Run GA4 fetch
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python ga4_daily_fetch.py

      - name: Commit cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ga4_cache.json
          git diff --staged --quiet || git commit -m "chore: update GA4 cache $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push

      - name: Update public Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          CONTENT=$(python3 -c "import json; print(json.dumps(open('ga4_cache.json').read()))")
          curl -s -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"files\":{\"ga4_cache.json\":{\"content\":$CONTENT}}}" \
            "https://api.github.com/gists/f77d144b7197e15abca389beea0b0133"
